name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov httpx pydantic pydantic-settings psycopg2-binary sqlalchemy alembic
    - name: Run tests with coverage
      run: |
        DATABASE_URL=sqlite:///./jobpulse_test.db python -m pytest --cov=src --cov-report=term-missing --cov-fail-under=75 tests/
