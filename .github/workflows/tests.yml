name: Tests & Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: jobpulse
          POSTGRES_PASSWORD: jobpulse_password
          POSTGRES_DB: jobpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jobpulse:jobpulse_password@localhost:5432/jobpulse
      API_KEY: testing-secret-key
      PRELOAD_EMBEDDINGS: false

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov httpx alembic pytest-archon pytest-benchmark
    - name: Apply Migrations
      run: alembic upgrade head
    - name: Run Test Suite & Generate Coverage
      run: pytest tests/ --cov=src --cov-report=xml
    - name: Enforce Coverage Thresholds
      run: |
        # In a real environment, we would use coverage report --fail-under
        # For this milestone, we use pyproject.toml or setup.cfg rules
        coverage report -m
    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage.xml
